<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusTab – Start Your Day</title>
    <link rel="stylesheet" href="styles/newtab.css">
    <link rel="icon" type="image/png" sizes="16x16"  href="icons/icon-16.png">
    <link rel="icon" type="image/png" sizes="48x48"  href="icons/icon-48.png">
    <link rel="icon" type="image/png" sizes="128x128" href="icons/icon-128.png">
</head>
<body class="dark-theme">

    <!-- ── Animated Background ── -->
    <div class="background-container" aria-hidden="true">
        <div class="gradient-bg gradient-1"></div>
        <div class="gradient-bg gradient-2"></div>
        <div class="gradient-bg gradient-3"></div>
        <div class="particle-container" id="particleContainer"></div>
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <!-- ── Main Layout ── -->
    <main class="container">

        <!-- Top: Greeting + Clock -->
        <div class="top-section">
            <h1 class="greeting" id="greeting">Good Morning</h1>
            <p class="motivational-message" id="motivationalMessage">Start your day with purpose!</p>
            <div class="top-clock">
                <span class="clock-value" id="clock">00:00</span>
            </div>
        </div>

        <!-- Central Card -->
        <div class="premium-card">

            <!-- Focus Input -->
            <div class="focus-section">
                <label for="focusInput" class="section-label">
                    <span class="label-icon">🎯</span>
                    Today's Main Focus
                </label>
                <div class="focus-input-wrapper">
                    <input
                        type="text"
                        id="focusInput"
                        class="focus-input"
                        placeholder="What's your main focus today?"
                        maxlength="100"
                        autocomplete="off"
                    >
                    <span class="focus-icon" aria-hidden="true">✎</span>
                </div>
            </div>

            <div class="divider"></div>

            <!-- Timer -->
            <div class="timer-section">
                <label class="section-label">
                    <span class="label-icon">⏱️</span>
                    Focus Timer
                </label>

                <div class="timer-display">
                    <svg class="timer-circle" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%"   stop-color="#6366f1" />
                                <stop offset="100%" stop-color="#ec4899" />
                            </linearGradient>
                        </defs>
                        <!-- r=80 → circumference ≈ 502.65 -->
                        <circle cx="90" cy="90" r="80" class="timer-bg"></circle>
                        <circle cx="90" cy="90" r="80" class="timer-progress" id="timerProgress"></circle>
                    </svg>
                    <div class="timer-text">
                        <span id="timerDisplay" class="timer-value">25:00</span>
                        <span class="timer-label">minutes</span>
                    </div>
                </div>

                <p class="timer-helper" id="timerHelper">Get ready to focus!</p>

                <div class="timer-controls">
                    <button class="btn btn-start" id="startBtn" aria-label="Start focus timer">
                        <span class="btn-icon">▶</span> Start Focus
                    </button>
                    <button class="btn btn-pause" id="pauseBtn" disabled aria-label="Pause timer">
                        <span class="btn-icon">⏸</span> Pause
                    </button>
                    <button class="btn btn-reset" id="resetBtn" aria-label="Reset timer">
                        <span class="btn-icon">↺</span> Reset
                    </button>
                </div>
            </div>

            <!-- quote wrapper: toggled as one unit so divider hides too -->
            <div id="quoteWrapper">
            <div class="divider"></div>

            <!-- Quote -->
            <div class="quote-section" id="quoteSection">
                <div class="quote-display" id="quoteDisplay">
                    <p class="quote-text"   id="quoteText">Loading your inspiration...</p>
                    <p class="quote-author" id="quoteAuthor">— FocusTab</p>
                </div>
                <button class="btn btn-quote" id="newQuoteBtn" aria-label="Show new quote">
                    <span class="btn-icon">✨</span> Inspire Me
                </button>
            </div>
            </div><!-- /#quoteWrapper -->

        </div><!-- /.premium-card -->
    </main>

    <!-- Floating Settings Button -->
    <button class="settings-btn" id="settingsBtn" aria-label="Open settings (Ctrl+Shift+S)" title="Settings">
        <span class="settings-icon" aria-hidden="true">⚙️</span>
    </button>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal" role="dialog" aria-modal="true" aria-label="Settings">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ Settings</h2>
                <button class="modal-close" id="closeSettingsBtn" aria-label="Close settings">&times;</button>
            </div>
            <div class="modal-body">

                <div class="setting-item">
                    <label for="animationsToggle" class="setting-label">Enable Animations</label>
                    <div class="toggle-switch">
                        <input type="checkbox" id="animationsToggle" checked>
                        <span class="slider"></span>
                    </div>
                </div>

                <div class="setting-item">
                    <label for="quotesToggle" class="setting-label">Show Quotes</label>
                    <div class="toggle-switch">
                        <input type="checkbox" id="quotesToggle" checked>
                        <span class="slider"></span>
                    </div>
                </div>

                <div class="setting-item">
                    <label for="soundToggle" class="setting-label">Sound on Timer Complete</label>
                    <div class="toggle-switch">
                        <input type="checkbox" id="soundToggle" checked>
                        <span class="slider"></span>
                    </div>
                </div>

                <div class="setting-item">
                    <label for="themeSelect" class="setting-label">Theme</label>
                    <select id="themeSelect" class="theme-select">
                        <option value="dark">🌙 Dark</option>
                        <option value="light">☀️ Light</option>
                        <option value="gradient">🌈 Gradient</option>
                        <option value="ocean">🌊 Ocean</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label for="timerDuration" class="setting-label">Focus Duration (min)</label>
                    <input type="number" id="timerDuration" min="1" max="120" value="25">
                </div>

            </div>
        </div>
    </div>

    <script src="scripts/newtab.js"></script>
</body>
</html>
